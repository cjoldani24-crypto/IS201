<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe vs AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    #game {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 2.5em;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .cell:hover {
      background: rgba(255,255,255,0.25);
    }

    .win {
      background: #00e676 !important;
      color: black;
    }

    #status { margin-top: 20px; }

    button {
      margin: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #ffca28;
      cursor: pointer;
    }

    button:hover {
      background: #ffc107;
    }
  </style>
</head>
<body>

<h1>🤖 Tic Tac Toe vs Computer</h1>

<div id="game"></div>
<div id="status">Your turn (X)</div>

<button onclick="resetGame()">New Game</button>

<script>
const game = document.getElementById("game");
const statusText = document.getElementById("status");

let board = ["","","","","","","","",""];
let human = "X";
let ai = "O";
let gameActive = true;

const winConditions = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function createBoard() {
  game.innerHTML = "";
  board.forEach((val, i) => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.index = i;
    cell.textContent = val;
    cell.addEventListener("click", handleClick);
    game.appendChild(cell);
  });
}

function handleClick(e) {
  const i = e.target.dataset.index;

  if (board[i] !== "" || !gameActive) return;

  board[i] = human;
  createBoard();

  if (checkWinner(board, human)) {
    statusText.textContent = "You win! 🎉";
    gameActive = false;
    return;
  }

  if (!board.includes("")) {
    statusText.textContent = "Draw!";
    gameActive = false;
    return;
  }

  statusText.textContent = "Computer thinking...";

  setTimeout(() => {
    let bestMove = minimax(board, ai).index;
    board[bestMove] = ai;
    createBoard();

    if (checkWinner(board, ai)) {
      statusText.textContent = "Computer wins 🤖";
      gameActive = false;
      return;
    }

    if (!board.includes("")) {
      statusText.textContent = "Draw!";
      gameActive = false;
      return;
    }

    statusText.textContent = "Your turn (X)";
  }, 500);
}

function checkWinner(b, player) {
  return winConditions.some(([a,b2,c]) =>
    b[a] === player && b[b2] === player && b[c] === player
  );
}

function minimax(newBoard, player) {
  let avail = newBoard.map((v,i)=> v===""?i:null).filter(v=>v!==null);

  if (checkWinner(newBoard, human)) return {score: -10};
  if (checkWinner(newBoard, ai)) return {score: 10};
  if (avail.length === 0) return {score: 0};

  let moves = [];

  for (let i of avail) {
    let move = {};
    move.index = i;
    newBoard[i] = player;

    if (player === ai) {
      let result = minimax(newBoard, human);
      move.score = result.score;
    } else {
      let result = minimax(newBoard, ai);
      move.score = result.score;
    }

    newBoard[i] = "";
    moves.push(move);
  }

  let bestMove;

  if (player === ai) {
    let bestScore = -Infinity;
    moves.forEach((m, i) => {
      if (m.score > bestScore) {
        bestScore = m.score;
        bestMove = i;
      }
    });
  } else {
    let bestScore = Infinity;
    moves.forEach((m, i) => {
      if (m.score < bestScore) {
        bestScore = m.score;
        bestMove = i;
      }
    });
  }

  return moves[bestMove];
}

function resetGame() {
  board = ["","","","","","","","",""];
  gameActive = true;
  statusText.textContent = "Your turn (X)";
  createBoard();
}

createBoard();
</script>

</body>
</html>
